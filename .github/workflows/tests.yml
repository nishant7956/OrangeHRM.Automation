name: Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: Test suite to run
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - api
          - regression
          - all
  schedule:
    # Daily at 10:30 UTC — 6:30 AM Toronto ET during daylight saving time
    - cron: '30 10 * * *'

# Cancel in-progress runs on the same branch/PR to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Matrix: run smoke, regression, and API in parallel ───────────────────
  test:
    name: ${{ matrix.suite }} tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        suite: [smoke, regression, api]
      fail-fast: false   # All suites run even if one fails

    env:
      BROWSER: Chrome
      HEADLESS: true
      ORANGEHRM_BASE_URL: https://opensource-demo.orangehrmlive.com/web/index.php
      ORANGEHRM_USERNAME: Admin
      ORANGEHRM_PASSWORD: admin123
      BOOKER_BASE_URL: https://restful-booker.herokuapp.com
      TEST_ARTIFACTS_DIR: TestResults
      # Pin Allure results to a known workspace-root directory per suite
      ALLURE_RESULTS_DIRECTORY: ${{ github.workspace }}/allure-results-${{ matrix.suite }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OrangeHRM.Automation.sln

      - name: Build
        run: dotnet build OrangeHRM.Automation.sln --configuration Release --no-restore

      # ── Resolve which filter to apply ──────────────────────────────────────
      - name: Resolve test filter
        id: filter
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"
          $inputSuite = "${{ github.event.inputs.test_suite }}"
          $matrixSuite = "${{ matrix.suite }}"

          # Manual dispatch overrides matrix: run only what was requested
          if ($eventName -eq "workflow_dispatch" -and $inputSuite -ne "" -and $inputSuite -ne "all") {
            if ($matrixSuite -ne $inputSuite) {
              echo "SKIP=true" >> $env:GITHUB_OUTPUT
              exit 0
            }
          }

          $filter = switch ($matrixSuite) {
            "smoke"      { "TestCategory=Smoke" }
            "regression" { "TestCategory=Regression" }
            "api"        { "TestCategory=API" }
            default      { "" }
          }

          # Scheduled runs: regression + API only
          if ($eventName -eq "schedule" -and $matrixSuite -eq "smoke") {
            echo "SKIP=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          echo "FILTER=$filter" >> $env:GITHUB_OUTPUT
          echo "SKIP=false" >> $env:GITHUB_OUTPUT

      # ── Run tests (continue-on-error so report always publishes) ──────────
      - name: Run ${{ matrix.suite }} tests
        if: steps.filter.outputs.SKIP != 'true'
        id: run_tests
        continue-on-error: true
        shell: pwsh
        run: |
          $filter = "${{ steps.filter.outputs.FILTER }}"
          $args = @(
            "test", "OrangeHRM.Automation.sln",
            "--configuration", "Release",
            "--no-build",
            "--logger", "trx;LogFileName=${{ matrix.suite }}-results.trx",
            "--results-directory", "TestResults",
            "--blame-hang-timeout", "2m"
          )
          if ($filter -ne "") { $args += @("--filter", $filter) }
          dotnet @args

      # ── Upload per-suite artifacts (always, even on test failures) ─────────
      - name: Upload ${{ matrix.suite }} artifacts
        if: always() && steps.filter.outputs.SKIP != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.suite }}
          path: |
            TestResults/**
            allure-results-${{ matrix.suite }}/**
          if-no-files-found: ignore

  # ─── Publish Allure report to GitHub Pages ─────────────────────────────────
  report:
    name: Publish Allure Report
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      # Install Allure CLI
      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure-2.29.0.tgz
          echo "$(pwd)/allure-2.29.0/bin" >> $GITHUB_PATH

      # Merge Allure results from all matrix legs into one directory
      - name: Merge and generate Allure report
        shell: bash
        run: |
          mkdir -p merged-allure-results

          echo "=== Artifact structure ==="
          find downloaded-artifacts -maxdepth 4 -type d | head -30

          # Copy only files from allure-results-* directories (not TRX, not config)
          for suite in smoke regression api; do
            src="downloaded-artifacts/test-artifacts-${suite}/allure-results-${suite}"
            if [ -d "$src" ]; then
              echo "Copying Allure results from: $src"
              cp -r "$src"/. merged-allure-results/ 2>/dev/null || true
            else
              echo "No Allure results found for suite: ${suite} (looked in ${src})"
            fi
          done

          echo "=== Merged results ($(ls merged-allure-results | wc -l) files) ==="
          ls merged-allure-results/ | head -20

          # Generate report — works even with zero result files
          allure generate merged-allure-results --clean -o allure-report \
            || echo "::warning::allure generate exited non-zero"

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: false
          keep_files: false

      # ── Write job summary ─────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        shell: bash
        run: |
          set +e  # Don't abort on non-zero exit codes (grep returns 1 when no match)

          echo "## 🧪 Automation Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          for suite in smoke regression api; do
            dir="downloaded-artifacts/test-artifacts-${suite}"
            if [ -d "$dir" ]; then
              trx=$(find "$dir" -name "*.trx" 2>/dev/null | head -1)
              if [ -n "$trx" ] && [ -f "$trx" ]; then
                passed=$(grep -c 'outcome="Passed"' "$trx" 2>/dev/null || echo "0")
                failed=$(grep -c 'outcome="Failed"' "$trx" 2>/dev/null || echo "0")
                passed="${passed:-0}"
                failed="${failed:-0}"
                if [ "$failed" = "0" ]; then
                  status="✅ Passed (${passed} passed)"
                else
                  status="❌ Failed (${passed} passed, ${failed} failed)"
                fi
              else
                status="⏭️ Skipped"
              fi
            else
              status="⏭️ Skipped"
            fi
            echo "| \`${suite}\` | ${status} |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View full Allure report](https://nishant7956.github.io/OrangeHRM.Automation/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Run triggered by: \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`_" >> $GITHUB_STEP_SUMMARY
